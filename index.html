
<!DOCTYPE html>

    <script>

                            100: "#dcedc8",
                            200: "#c5e1a5",
                            300: "#aed581",
                            400: "#9ccc65",
                            500: "#82c341",
                            600: "#7cb342",
                            700: "#689f38",

    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

            font-variation-settings: 'FILL' 1;

        }
        .dark ::-webkit-scrollbar-thumb {
            background: #334155;
        }
        html {
            scroll-behavior: smooth;
        }

<script>
  window.process = { env: { NODE_ENV: 'production' } };
